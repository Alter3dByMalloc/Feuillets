<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feuillets · Auteur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1c1a18;
    --bg-soft:#211f1c;
    --ink:#f4f0ea;
    --soft:#c7c0b6;
    --muted:#8a837a;
    --faint:#6f685f;
    --line:#37322d;
    --line-2:#46403a;
    --accent:#c4774e;
    --serif:"Playfair Display", Georgia, serif;
    --book:"Lora", Georgia, serif;
    --sans:"Mulish", system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;}
  a{color:inherit;text-decoration:none;}
  .page{max-width:1120px;margin:0 auto;}

  /* ---------- Header ---------- */
  header{display:flex;align-items:center;gap:34px;padding:20px 22px;border-bottom:1px solid var(--line);}
  .logo{font-family:var(--serif);font-size:27px;font-weight:700;letter-spacing:.01em;line-height:1;color:inherit;text-decoration:none;}
  .logo i{font-style:italic;font-weight:500;color:var(--accent);}
  nav{display:flex;align-items:center;gap:30px;margin-left:6px;}
  nav a{font-size:14.5px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;opacity:.92;transition:opacity .2s,color .2s;}
  nav a:hover{color:var(--accent);opacity:1;}
  nav a.active{color:var(--accent);opacity:1;}
  .actions{margin-left:auto;display:flex;align-items:center;gap:20px;}
  .search{background:none;border:none;color:var(--ink);cursor:pointer;display:flex;opacity:.9;transition:color .2s;}
  .search:hover{color:var(--accent);}
  .btn-line{font-family:var(--sans);border:1px solid var(--line);background:none;color:var(--ink);padding:13px 26px;font-size:13.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:border-color .2s,background .2s;}
  .btn-line:hover{border-color:var(--accent);background:rgba(196,119,78,.08);}
  .btn-publish{display:inline-flex;align-items:center;gap:9px;font-family:var(--sans);border:1px solid var(--accent);background:var(--accent);color:#1c1a18;text-decoration:none;padding:13px 22px;font-size:13.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s,border-color .2s;}
  .btn-publish:hover{background:#d4865c;border-color:#d4865c;}
  .btn-publish svg{width:16px;height:16px;}

  /* ---------- Profile ---------- */
  .wrap{padding:0 22px;}
  .back{display:inline-flex;align-items:center;gap:9px;margin-top:34px;font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:color .2s,gap .2s;}
  .back:hover{color:var(--accent);gap:13px;}

  .profile{display:flex;gap:34px;align-items:flex-start;padding:34px 0 44px;}
  .avatar-lg{width:104px;height:104px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-weight:700;font-size:36px;flex:none;letter-spacing:.01em;}
  .p-info{min-width:0;flex:1;}
  .p-role{font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
  .p-role .g{position:relative;}
  .p-role .g + .g{margin-left:14px;}
  .p-role .g + .g::before{content:"·";position:absolute;left:-10px;color:var(--faint);}
  .p-info h1{font-family:var(--serif);font-weight:800;font-size:46px;line-height:1.02;letter-spacing:-.01em;color:#fbf8f3;margin-bottom:22px;}
  .p-bio{font-family:var(--book);font-style:italic;font-size:20px;line-height:1.62;color:var(--soft);max-width:60ch;margin-bottom:28px;}
  .p-stats{display:flex;flex-wrap:wrap;gap:0 30px;}
  .stat{display:flex;flex-direction:column;gap:5px;}
  .stat .v{font-family:var(--serif);font-weight:700;font-size:24px;color:#fbf8f3;display:inline-flex;align-items:center;gap:7px;}
  .stat .v .star{color:#e0b341;font-size:20px;}
  .stat .l{font-size:11.5px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);}
  .stat + .stat{padding-left:30px;border-left:1px solid var(--line);}

  /* ---------- Stories ---------- */
  .stories{border-top:1px solid var(--line);padding:34px 22px 70px;}
  .stories > h2{font-size:13px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:26px;}
  .stories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,370px));gap:18px;}
  .scard{border:1px solid var(--line);background:var(--bg);padding:26px 26px 24px;display:flex;flex-direction:column;
    position:relative;transition:border-color .2s,background .2s;}
  .scard:hover{border-color:var(--line-2);background:var(--bg-soft);}
  .card-themes{display:flex;flex-wrap:wrap;gap:8px 12px;margin-bottom:14px;}
  .tlabel{font-size:11.5px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;position:relative;}
  .tlabel + .tlabel::before{content:"·";position:absolute;left:-9px;color:var(--faint);}
  .scard h3{font-family:var(--serif);font-weight:700;font-size:23px;line-height:1.16;color:#fbf8f3;margin-bottom:13px;}
  .excerpt{font-family:var(--book);font-style:italic;font-size:15.5px;line-height:1.55;color:var(--soft);margin-bottom:18px;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
  .ttag{font-size:11.5px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 9px;}
  .card-meta{margin-top:auto;font-size:13.5px;color:var(--muted);display:flex;align-items:center;gap:7px;}
  .card-meta .rr{margin-left:auto;display:inline-flex;align-items:center;gap:11px;}
  .card-meta .rating{display:inline-flex;align-items:center;gap:5px;color:var(--soft);font-variant-numeric:tabular-nums;}
  .card-meta .rating .star{color:#e0b341;}
  .card-meta .read{display:inline-flex;align-items:center;gap:6px;color:var(--faint);}
  .scard .arrow{position:absolute;top:24px;right:24px;color:var(--faint);opacity:0;transform:translate(-4px,4px);transition:opacity .2s,transform .2s;}
  .scard:hover .arrow{opacity:1;transform:translate(0,0);color:var(--accent);}

  /* ---------- Sections (séries / indépendantes) ---------- */
  .story-section + .story-section{margin-top:46px;}
  .section-label{font-size:13px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;}
  .series-band{display:flex;align-items:center;gap:20px;margin-bottom:18px;padding:22px 24px;
    border:1px solid var(--line-2);background:var(--bg-soft);text-decoration:none;color:inherit;
    transition:border-color .2s,background .2s;}
  .series-band:hover{border-color:var(--accent);background:rgba(196,119,78,.07);}
  .series-band .ic{flex:none;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:var(--accent);background:rgba(196,119,78,.13);border:1px solid color-mix(in srgb,var(--accent) 50%,transparent);}
  .series-band .ic svg{width:19px;height:19px;}
  .series-band .sb-main{flex:1;min-width:0;}
  .series-band .sb-name{display:block;font-family:var(--serif);font-weight:700;font-size:23px;line-height:1.1;color:#fbf8f3;}
  .series-band .sb-desc{display:block;font-family:var(--book);font-style:italic;font-size:15px;line-height:1.5;color:var(--soft);margin-top:8px;max-width:64ch;}
  .series-band .sb-meta{display:flex;font-size:13px;color:var(--muted);margin-top:11px;align-items:center;gap:8px;}
  .series-band .sb-meta .star{color:#e0b341;}
  .series-band .sb-go{flex:none;color:var(--faint);transition:color .18s,transform .18s;align-self:center;}
  .series-band:hover .sb-go{color:var(--accent);transform:translateX(3px);}
  .tome-flag{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;
    color:var(--accent);margin-bottom:13px;}
  .tome-flag::before{content:"";width:14px;height:1px;background:var(--accent);display:inline-block;}

  footer{height:50px;}
  @media (max-width:620px){
    nav{display:none;}
    .profile{flex-direction:column;gap:22px;}
    .p-info h1{font-size:36px;}
  }
</style>
</head>

    <div class="actions">
      <a class="btn-publish" href="NouvellePublication.html">

<script src="series.js"></script>
<script>
const THEME_COLOR = {
  'Polar':'#c4774e','Thriller':'#c25c4a','Science-fiction':'#6791c4',
  'Fantasy':'#b277c2','Roman':'#c97a9c','Témoignage':'#5ea283','Nouvelle':'#8a9d6a'
};

const AUTHORS = {
  'nadia-ahmadi':{name:"Nadia Ahmadi", role:"Autrice", themes:['Témoignage'],
    bio:"Raconte l'exil et la reconstruction avec une pudeur qui n'exclut jamais la lumière. Née à Kaboul et arrivée en France adolescente, elle puise dans l'entre-deux-cultures la matière de ses récits.",
    works:[{title:"Kaboul, l'été de mes quinze ans", slug:"kaboul-quinze-ans", themes:['Témoignage'], chars:['Faits réels','Première personne','Mélancolique'], rating:"4,9", time:20, readers:"3 685", excerpt:"Un récit intime sur l'exil, la reconstruction et la résilience d'une adolescente devenue femme entre deux cultures."},
    {title:"La Langue de l'autre", slug:"la-langue-de-l-autre", themes:['Témoignage'], chars:['Première personne','Faits réels','Lumineux'], rating:"4,7", time:14, readers:"2 410", excerpt:"Apprendre à penser, à rêver, à aimer dans une langue qui n'était pas la sienne — et y trouver, un jour, une seconde naissance."}]},
  'sophie-arnaud':{name:"Sophie Arnaud", role:"Autrice", themes:['Nouvelle','Roman'],
    bio:"Cisèle des nouvelles solaires où l'enfance se dénoue tout en délicatesse. Ses histoires, souvent méditerranéennes, tiennent en quelques pages et laissent une trace longtemps après.",
    works:[{title:"Le Dernier Été à Paros", slug:"le-dernier-ete-a-paros", themes:['Nouvelle','Roman'], chars:['Lumineux','Lecture courte','Personnage féminin'], rating:"4,6", time:12, readers:"1 876", excerpt:"Deux sœurs, une maison blanche au bord de l'Égée, et l'été où tout, doucement, a basculé."},
    {title:"La Marchande de Coquillages", slug:"la-marchande-de-coquillages", themes:['Nouvelle'], chars:['Lumineux','Lecture courte','Mélancolique'], rating:"4,5", time:9, readers:"1 320", excerpt:"Sur le port, une vieille femme vend des coquillages et, à qui sait écouter, le bruit d'étés que l'on croyait perdus."}]},
  'jean-luc-breton':{name:"Jean-Luc Breton", role:"Auteur", themes:['Polar','Thriller'],
    bio:"Signe des polars où l'esthétique du crime confine au vertige. Ancien journaliste de faits divers, il compose ses intrigues comme on accroche une exposition.",
    works:[{title:"L'Architecte des Ombres", slug:"l-architecte-des-ombres", themes:['Polar','Thriller'], chars:['Atmosphérique','Rythme intense','Personnage féminin'], rating:"4,8", time:35, readers:"7 210", excerpt:"Dans une ville brumeuse du Nord, l'inspectrice Vera Kalm traque un tueur qui transforme chaque scène de crime en tableau."},
    {title:"Le Vernissage", slug:"le-vernissage", themes:['Polar','Thriller'], chars:['Atmosphérique','Fin inattendue','Rythme intense'], rating:"4,6", time:28, readers:"5 480", excerpt:"Le soir du vernissage, une toile de trop est accrochée au mur. Personne ne l'a peinte. Tout le monde s'y reconnaît."}]},
  'marc-duval':{name:"Marc Duval", role:"Auteur", themes:['Polar'],
    bio:"Ressuscite le Paris des affaires non résolues et des rancunes patientes. Ses enquêtes avancent à pas lents, jusqu'à la révélation qui rebat toutes les cartes.",
    works:[{title:"Vengeance à Montmartre", slug:"vengeance-a-montmartre", themes:['Polar'], chars:['Rythme intense','Fin inattendue'], rating:"4,5", time:18, readers:"4 058", excerpt:"Trente ans après, un nom resurgit dans un carnet jauni. Pour le commissaire Le Goff, l'affaire n'a jamais été close."},
    {title:"Le Témoin du Quai des Orfèvres", slug:"le-temoin-du-quai", themes:['Polar'], chars:['Rythme intense','Atmosphérique'], rating:"4,4", time:16, readers:"3 210", excerpt:"Un seul témoin, un seul aveu, et trente années d'archives qui, soudain, ne racontent plus la même histoire."}]},
  'claire-fontaine':{name:"Claire Fontaine", role:"Autrice", themes:['Roman'],
    bio:"Explore les héritages intimes et les vérités que les familles préfèrent enterrer. Elle écrit la mémoire comme un grenier qu'on n'ose pas vraiment vider.",
    works:[{title:"Les Cendres du Lendemain", slug:"les-cendres-du-lendemain", themes:['Roman'], chars:['Mélancolique','Personnage féminin','Faits réels'], rating:"4,5", time:8, readers:"2 940", excerpt:"Une femme retrouve les lettres de sa mère disparue, et avec elles, une vérité qu'elle n'était pas prête à entendre."},
    {title:"La Chambre du Haut", slug:"la-chambre-du-haut", themes:['Roman'], chars:['Mélancolique','Personnage féminin'], rating:"4,4", time:11, readers:"2 105", excerpt:"On ferme certaines portes pour ne pas réveiller les morts. Trente ans après, elle décide enfin d'ouvrir celle du haut."}]},
  'thomas-leray':{name:"Thomas Leray", role:"Auteur", themes:['Science-fiction'],
    bio:"Imagine des futurs proches où la technologie touche au plus intime de l'humain. Chez lui, l'anticipation n'est jamais qu'un miroir tendu au présent.",
    works:[{title:"Mémoire Vive", slug:"memoire-vive", themes:['Science-fiction'], chars:['Rythme intense','Fin inattendue'], rating:"4,6", time:15, readers:"5 117", excerpt:"En 2041, les souvenirs se vendent au marché noir. Marcus veut récupérer les siens, coûte que coûte."},
    {title:"Le Dernier Algorithme", slug:"le-dernier-algorithme", themes:['Science-fiction'], chars:['Rythme intense','Atmosphérique'], rating:"4,5", time:18, readers:"4 660", excerpt:"La première intelligence à se savoir mortelle n'a pas demandé à vivre plus longtemps. Elle a demandé à comprendre pourquoi."}]},
  'helene-marquet':{name:"Hélène Marquet", role:"Autrice", themes:['Thriller','Polar'],
    bio:"Excelle dans les huis clos où la civilité n'est qu'un vernis sur la peur. Elle aime enfermer ses personnages pour mieux révéler ce qu'ils dissimulent.",
    works:[{title:"La Maison aux Volets Clos", slug:"la-maison-aux-volets-clos", themes:['Thriller','Polar'], chars:['Huis clos','Fin inattendue','Atmosphérique'], rating:"4,8", time:16, readers:"5 690", excerpt:"Six invités, une demeure isolée par la neige, et un hôte qui n'apparaît jamais. La nuit sera longue."},
    {title:"L'Ascenseur", slug:"l-ascenseur", themes:['Thriller','Polar'], chars:['Huis clos','Rythme intense','Atmosphérique'], rating:"4,7", time:13, readers:"4 980", excerpt:"Entre le huitième et le neuvième étage, l'ascenseur s'est immobilisé. Ils étaient quatre. L'un d'eux n'aurait jamais dû monter."}]},
  'elise-morvan':{name:"Élise Morvan", role:"Autrice", themes:['Thriller'],
    bio:"Écrit des nouvelles où les gares, les couloirs et les chambres d'hôtel deviennent des seuils. Le fantastique y affleure toujours, discret, au bord du réel.",
    works:[{title:"Le Dernier Train pour Minuit", slug:"le-dernier-train-pour-minuit", themes:['Thriller'], chars:['Atmosphérique','Huis clos','Première personne'], rating:"4,7", time:12, readers:"4 832", excerpt:"Elle ne devait jamais monter dans ce train. Pourtant, le quai 9 l'attendait, silencieux comme un secret."},
    {title:"Chambre 313", slug:"chambre-313", themes:['Thriller'], chars:['Atmosphérique','Première personne','Huis clos'], rating:"4,6", time:11, readers:"3 870", excerpt:"L'hôtel n'avait pas de treizième étage. Pourtant, sa clé portait le numéro 313, et l'ascenseur, lui, savait où aller."},
    {title:"La Consigne 47", slug:"la-consigne-47", themes:['Thriller'], chars:['Atmosphérique','Première personne'], rating:"4,6", time:10, readers:"2 612", excerpt:"Dans le hall désert de la gare, un casier que personne n'a loué s'ouvre chaque nuit à la même heure — et chaque matin, il est de nouveau verrouillé."},
    {title:"Onze Heures Onze", slug:"onze-heures-onze", themes:['Thriller'], chars:['Atmosphérique','Mélancolique'], rating:"4,5", time:9, readers:"2 184", excerpt:"Chaque nuit, sa montre s'arrête à 23 h 11. Et l'on frappe trois coups à une porte que le plan de l'hôtel ne mentionne nulle part."}]},
  'paul-renard':{name:"Paul Renard", role:"Auteur", themes:['Science-fiction'],
    bio:"Explore les vertiges du temps long et les espoirs que l'on transmet malgré tout. Ses vaisseaux et ses ruines parlent surtout de ceux qui restent.",
    works:[{title:"Les Enfants du Vide", slug:"les-enfants-du-vide", themes:['Science-fiction'], chars:['Atmosphérique','Mélancolique','Fin inattendue'], rating:"4,7", time:22, readers:"3 442", excerpt:"À bord d'un vaisseau-génération, la dernière génération née en route apprend qu'aucune planète ne les attend."},
    {title:"La Dernière Sonde", slug:"la-derniere-sonde", themes:['Science-fiction'], chars:['Mélancolique','Atmosphérique'], rating:"4,6", time:19, readers:"2 940", excerpt:"Lancée avant l'extinction, une sonde continue d'émettre vers une Terre qui ne répond plus. Quelqu'un, pourtant, l'écoute encore."},
    {title:"La Première Graine", slug:"la-premiere-graine", themes:['Science-fiction'], chars:['Atmosphérique','Mélancolique','Lumineux'], rating:"4,6", time:17, readers:"2 510", excerpt:"On lui avait confié une graine et un siècle. Sur Erebus, monde de cendre et de gel, elle planta la première — sachant qu'elle ne verrait jamais l'arbre."},
    {title:"La Dernière Récolte", slug:"la-derniere-recolte", themes:['Science-fiction'], chars:['Atmosphérique','Mélancolique','Fin inattendue'], rating:"4,7", time:20, readers:"2 230", excerpt:"Quatre générations plus tard, Erebus a des forêts. Mais le jour de la première récolte, le monde découvre qu'il attendait, lui aussi, quelque chose des jardiniers."},
    {title:"Le Phare de Proxima", slug:"le-phare-de-proxima", themes:['Science-fiction'], chars:['Atmosphérique','Mélancolique'], rating:"4,5", time:16, readers:"2 040", excerpt:"À mi-chemin entre deux étoiles, une balise solitaire répète le même message depuis mille ans. Le jour où elle se tait, un vaisseau, enfin, change de cap."}]},
  'camille-roy':{name:"Camille Roy", role:"Autrice", themes:['Roman','Témoignage'],
    bio:"Signe des récits épistolaires sur le deuil, l'écriture et la présence des absents. Sa langue, simple et tenue, fait de chaque lettre un acte de survie.",
    works:[{title:"Lettres à personne", slug:"lettres-a-personne", themes:['Roman','Témoignage'], chars:['Mélancolique','Première personne','Lecture courte'], rating:"4,7", time:9, readers:"2 770", excerpt:"Chaque soir, elle écrit une lettre qu'elle n'enverra jamais. Un an plus tard, quelqu'un commence à répondre."},
    {title:"Le Répondeur", slug:"le-repondeur", themes:['Roman','Témoignage'], chars:['Mélancolique','Première personne','Lecture courte'], rating:"4,6", time:8, readers:"2 240", excerpt:"Elle n'a jamais effacé le message. Chaque soir, elle compose le numéro, juste pour entendre, encore, le timbre d'une voix éteinte."}]},
  'julien-sorel':{name:"Julien Sorel", role:"Auteur", themes:['Fantasy'],
    bio:"Construit des fantasies oniriques à la lisière de la veille et du sommeil. Il cartographie l'invisible avec la rigueur d'un géographe et la liberté d'un rêveur.",
    works:[{title:"Le Cartographe des Rêves", slug:"le-cartographe-des-reves", themes:['Fantasy'], chars:['Atmosphérique','Lumineux','Première personne'], rating:"4,5", time:25, readers:"2 014", excerpt:"On l'engage pour dessiner les territoires que les dormeurs visitent. Une carte, pourtant, refuse d'être achevée."},
    {title:"L'Horloger du Crépuscule", slug:"l-horloger-du-crepuscule", themes:['Fantasy'], chars:['Atmosphérique','Lumineux'], rating:"4,4", time:21, readers:"1 760", excerpt:"Dans son atelier sans fenêtre, un horloger répare le temps des autres. Le sien, depuis longtemps, s'est arrêté à six heures."}]},
  'amelie-voss':{name:"Amélie Voss", role:"Autrice", themes:['Fantasy'],
    bio:"Tisse des fantasies lumineuses où le merveilleux a toujours un prix. Ses héroïnes gardent des seuils, des phares, des promesses — et en paient le coût.",
    works:[{title:"La Gardienne du Phare", slug:"la-gardienne-du-phare", themes:['Fantasy'], chars:['Atmosphérique','Personnage féminin','Lumineux'], rating:"4,4", time:10, readers:"2 301", excerpt:"Sur une île que les cartes ont oubliée, une jeune femme veille sur une lumière qui ne devrait pas exister."},
    {title:"La Tisseuse de Marées", slug:"la-tisseuse-de-marees", themes:['Fantasy'], chars:['Atmosphérique','Personnage féminin','Lumineux'], rating:"4,3", time:12, readers:"1 980", excerpt:"Au bout de la jetée, une femme tisse la mer comme une étoffe. Chaque vague qu'elle noue éloigne un peu plus celui qu'elle attend."}]}
};

function initials(name){
  const w = name.split(/[\s-]+/).filter(Boolean);
  return ((w[0]||'')[0] + (w[w.length-1]||'')[0]).toUpperCase();
}
function avgRating(works){
  const n = works.map(w=>parseFloat(w.rating.replace(',', '.')));
  const m = n.reduce((a,b)=>a+b,0)/n.length;
  return m.toFixed(1).replace('.', ',');
}
function totalReaders(works){
  const t = works.reduce((a,w)=>a + parseInt(w.readers.replace(/\s/g,''),10), 0);
  return t.toLocaleString('fr-FR');
}

const slug = new URLSearchParams(location.search).get('id');
const a = AUTHORS[slug] || AUTHORS['elise-morvan'];
const authorKey = AUTHORS[slug] ? slug : 'elise-morvan';
const color = THEME_COLOR[a.themes[0]] || 'var(--accent)';

document.title = "Feuillets · " + a.name;
const av = document.getElementById('avatar');
av.textContent = initials(a.name);
av.style.background = `color-mix(in srgb, ${color} 15%, transparent)`;
av.style.border = `1px solid color-mix(in srgb, ${color} 55%, transparent)`;
av.style.color = color;

document.getElementById('role').innerHTML =
  `<span class="g">${a.role}</span>` + a.themes.map(t=>`<span class="g" style="color:${THEME_COLOR[t]}">${t}</span>`).join('');
document.getElementById('name').textContent = a.name;
document.getElementById('bio').textContent = a.bio;

const nbHist = a.works.length;
const authorSeries = FS.SERIES.filter(s=>s.authorSlug===authorKey);
const nbSeries = authorSeries.length;
document.getElementById('stats').innerHTML = `
  <div class="stat"><span class="v">${nbHist}</span><span class="l">${nbHist>1?'histoires':'histoire'}</span></div>
  <div class="stat"><span class="v">${nbSeries}</span><span class="l">${nbSeries>1?'séries':'série'}</span></div>
  <div class="stat"><span class="v"><span class="star">★</span> ${avgRating(a.works)}</span><span class="l">Note moyenne</span></div>
  <div class="stat"><span class="v">${totalReaders(a.works)}</span><span class="l">Lecteurs</span></div>`;

const ARROW = `<span class="arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="8 7 17 7 17 16"></polyline></svg></span>`;

function buildCard(w, tomeNum){
  const themesHtml = w.themes.map(t=>`<span class="tlabel" style="color:${THEME_COLOR[t]}">${t}</span>`).join('');
  const tagsHtml = w.chars.map(c=>`<span class="ttag">${c}</span>`).join('');
  const flag = tomeNum ? `<div class="tome-flag">Tome ${tomeNum}</div>` : '';
  const card = document.createElement('a');
  card.className = 'scard';
  card.href = 'Histoire.html?id=' + w.slug;
  card.innerHTML = `
    ${ARROW}
    ${flag}
    <div class="card-themes">${themesHtml}</div>
    <h3>${w.title}</h3>
    <p class="excerpt">${w.excerpt}</p>
    <div class="card-tags">${tagsHtml}</div>
    <div class="card-meta"><span>${w.time} min de lecture</span><span class="rr"><span class="rating"><span class="star">★</span> ${w.rating}</span></span></div>`;
  return card;
}

const bySlug = Object.fromEntries(a.works.map(w=>[w.slug, w]));
const inSeries = new Set();
const body = document.getElementById('stories-body');

// 1) Sections séries (histoires hiérarchisées dans l'ordre de lecture)
authorSeries.forEach(ser=>{
  const section = document.createElement('section');
  section.className = 'story-section';
  const themesTxt = ser.themes.join(' · ');
  section.innerHTML = `
    <h2 class="section-label">${nbSeries>1?'Série — '+ser.title:'Série'}</h2>
    <a class="series-band" href="Serie.html?id=${ser.id}">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h11a2 2 0 0 1 2 2v14"></path><path d="M8 4v16"></path><path d="M20 7v13H6"></path></svg></span>
      <span class="sb-main">
        <span class="sb-name">${ser.title}</span>
        <span class="sb-desc">${ser.description}</span>
        <span class="sb-meta">${themesTxt} · ${ser.count} histoires · <span class="star">★</span> ${FS.fmt(ser.rating)}</span>
      </span>
      <span class="sb-go"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></span>
    </a>`;
  const grid = document.createElement('div');
  grid.className = 'stories-grid';
  ser.stories.forEach((st, i)=>{
    const w = bySlug[st.slug];
    if(!w) return;
    inSeries.add(st.slug);
    grid.appendChild(buildCard(w, i+1));
  });
  section.appendChild(grid);
  body.appendChild(section);
});

// 2) Section histoires indépendantes
const independents = a.works.filter(w=>!inSeries.has(w.slug));
if(independents.length){
  const section = document.createElement('section');
  section.className = 'story-section';
  const label = nbSeries>0 ? 'Histoires indépendantes' : (nbHist>1 ? 'Ses histoires' : 'Son histoire');
  section.innerHTML = `<h2 class="section-label">${label}</h2>`;
  const grid = document.createElement('div');
  grid.className = 'stories-grid';
  independents.forEach(w=>grid.appendChild(buildCard(w)));
  section.appendChild(grid);
  body.appendChild(section);
}
</script>
<script src="auth.js"></script>
</body>
</html>
